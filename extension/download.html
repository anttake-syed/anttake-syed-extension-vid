<!DOCTYPE html>
<html>
<head>
    <title>Saving Recording...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            gap: 16px;
        }
        .icon-wrap { font-size: 52px; transition: all 0.4s ease; }
        h2 { margin: 0; font-size: 18px; font-weight: 600; }
        p { margin: 0; font-size: 13px; color: #94a3b8; text-align: center; max-width: 340px; }

        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            width: 44px; height: 44px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #manual-btn {
            margin-top: 12px;
            padding: 12px 28px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: none;
        }
        #manual-btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="icon-wrap" id="icon"><div class="loader"></div></div>
    <h2 id="title">Preparing your video...</h2>
    <p id="msg">Hold on, reading your recording from local storage.</p>
    <a id="manual-btn">💾 Save manually</a>
    <script type="module" src="download.js"></script>
</body>
</html>
