<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntCapture</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AntCapture</h1>
      <button class="settings-btn" id="settingsBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>

    <div class="card">
      <div class="status-bar">
        <div class="status-dot"></div>
        <span>Cloud Sync Active</span>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn primary" id="recordBtn">
        <span class="btn-icon">⏺</span>
        <span class="btn-text">Record Screen</span>
      </button>
      <button class="btn" id="screenshotBtn">
        <span class="btn-icon">📸</span>
        <span class="btn-text">Screenshot</span>
      </button>
    </div>

    <!-- Add Login Button -->
    <button class="btn" id="googleLoginBtn" style="margin-top: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
      <span class="btn-icon">☁️</span>
      <span class="btn-text">Sign in with Google</span>
    </button>

    <div class="footer">
      <div id="captureCountBadge">Captures: 0</div>
      <span>v1.0.0</span>
      <span id="storageInfo">Used: 12MB / 15GB</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
