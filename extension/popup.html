<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntCapture</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AntCapture</h1>
      <button class="settings-btn" id="settingsBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>

    <div class="card">
      <div class="status-bar">
        <div class="status-dot"></div>
        <span>Cloud Sync Active</span>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn primary" id="recordBtn">
        <span class="btn-icon">⏺</span>
        <span class="btn-text">Record Screen</span>
      </button>
      <button class="btn" id="screenshotBtn">
        <span class="btn-icon">📸</span>
        <span class="btn-text">Screenshot</span>
      </button>
    </div>

    <!-- Auth Section -->
    <div id="authSection" style="margin-top: 12px;">
      <button class="btn" id="googleLoginBtn" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
        <span class="btn-icon">☁️</span>
        <span class="btn-text">Sign in with Google</span>
      </button>

      <div id="profileContainer" class="card" style="display: none; padding: 12px; margin-top: 0; align-items: center; gap: 12px; flex-direction: row; cursor: default;">
        <img id="userAvatar" src="" style="width: 32px; height: 32px; border-radius: 50%; background: #1e293b; border: 1px solid rgba(255,255,255,0.1);" />
        <div style="flex: 1; overflow: hidden;">
          <div id="userName" style="font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">User Name</div>
          <div id="userEmail" style="font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">user@example.com</div>
        </div>
        <button id="logoutBtn" style="background: none; border: none; color: #f87171; cursor: pointer; font-size: 16px; padding: 4px;" title="Sign Out">🚪</button>
      </div>
    </div>

    <div class="footer">
      <div id="captureCountBadge">Captures: 0</div>
      <span>v1.0.0</span>
      <span id="storageInfo">Used: 12MB / 15GB</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
